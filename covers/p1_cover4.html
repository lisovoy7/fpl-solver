<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{width:1200px;height:630px;overflow:hidden;background:#0f172a;position:relative;font-family:'Inter',sans-serif}.bg-text{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:280px;color:rgba(255,255,255,0.02);top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;letter-spacing:20px}
.bar{position:absolute;bottom:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981,#3b82f6,#8b5cf6)}
.c{position:relative;z-index:1;padding:60px 80px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:24px}
h1{font-family:'Bebas Neue',sans-serif;font-size:72px;color:#fff;letter-spacing:3px;line-height:1.05}h1 span{color:#3b82f6}
.sub{color:#94a3b8;font-size:15px;line-height:1.7;max-width:700px}
.badges{display:flex;gap:12px;flex-wrap:wrap}
.badge{padding:6px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:#94a3b8;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.badge.hl{border-color:rgba(59,130,246,0.4);color:#60a5fa;background:rgba(59,130,246,0.08)}
.part-tag{position:absolute;top:60px;right:80px;color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:3px;text-transform:uppercase;writing-mode:vertical-lr}
</style></head><body>
<div class="bg-text">MILP SOLVER</div>
<div class="bar"></div>
<div class="part-tag">Part 1 of 2</div>
<div class="c">
<h1>FANTASY PREMIER LEAGUE<br>MEETS <span>INTEGER PROGRAMMING</span></h1>
<div class="sub">A mathematical optimization model that plans your entire remaining season — every transfer, every captain, every chip — in one solve.</div>
<div class="badges">
<div class="badge hl">MILP</div>
<div class="badge">Branch & Bound</div>
<div class="badge">7,200 Variables</div>
<div class="badge">5,000 Constraints</div>
<div class="badge hl">Open Source</div>
</div>
</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 900px; height: 520px; overflow: hidden;
  background: #0f172a; font-family: 'Inter', sans-serif;
  padding: 30px 36px 20px 36px;
}
.title {
  color: #e2e8f0; font-size: 16px; font-weight: 600;
  margin-bottom: 2px;
}
.subtitle {
  color: #64748b; font-size: 12px; margin-bottom: 16px;
}
.chart-wrap { position: relative; width: 828px; height: 410px; }
</style>
</head><body>
<div class="title">Overall Rank Percentile — Season 2025/26</div>
<div class="subtitle">Out of ~10 million managers worldwide. Higher = better.</div>
<div class="chart-wrap"><canvas id="chart"></canvas></div>
<script>
const gws = Array.from({length: 29}, (_, i) => i + 1);
const ranks = [1939861,1083964,2444832,3127971,1977616,1018572,1374742,1817027,2115572,1899201,1962582,1994977,865467,1283743,1234588,1633343,1536976,1326992,958274,782227,817388,577918,737453,532292,335207,229650,333199,399017,123709];
const total = 10000000;
const percentiles = ranks.map(r => ((1 - r / total) * 100));

const solverStart = 6; // index 6 = GW7

const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: gws.map(g => 'GW' + g),
    datasets: [{
      data: percentiles,
      borderColor: '#38bdf8',
      backgroundColor: 'rgba(56,189,248,0.06)',
      pointBackgroundColor: percentiles.map((v, i) => i === 28 ? '#fbbf24' : '#38bdf8'),
      pointBorderColor: percentiles.map((v, i) => i === 28 ? '#fbbf24' : '#38bdf8'),
      pointRadius: percentiles.map((v, i) => i === 28 ? 7 : 3),
      pointHoverRadius: 6,
      borderWidth: 2.5,
      tension: 0.3,
      fill: true,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1e293b',
        titleColor: '#e2e8f0',
        bodyColor: '#94a3b8',
        borderColor: '#334155',
        borderWidth: 1,
        padding: 10,
        displayColors: false,
        callbacks: {
          label: function(ctx) {
            if (ctx.raw === null) return '';
            const idx = ctx.dataIndex;
            return `Percentile: ${ctx.raw.toFixed(1)}%  (Rank: ${ranks[idx].toLocaleString()})`;
          }
        }
      },
      annotation: {
        annotations: {
          solverLine: {
            type: 'line',
            xMin: solverStart,
            xMax: solverStart,
            borderColor: 'rgba(251,191,36,0.4)',
            borderWidth: 1.5,
            borderDash: [6, 4],
            label: {
              display: true,
              content: 'Solver enabled',
              position: 'start',
              backgroundColor: 'rgba(251,191,36,0.15)',
              color: '#fbbf24',
              font: { size: 10, family: 'Inter', weight: '500' },
              padding: { top: 3, bottom: 3, left: 8, right: 8 },
              borderRadius: 3,
            }
          },
          topLabel: {
            type: 'label',
            xValue: 24,
            yValue: percentiles[28] - 7,
            content: ['GW29: 98.8th percentile'],
            color: '#fbbf24',
            font: { size: 11, family: 'Inter', weight: '700' },
            textAlign: 'center',
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(148,163,184,0.06)', drawBorder: false },
        ticks: {
          color: '#475569', font: { size: 10, family: 'Inter' },
          maxRotation: 0,
          callback: function(val, idx) {
            return (idx % 3 === 0) ? this.getLabelForValue(val) : '';
          }
        }
      },
      y: {
        min: 65,
        max: 100,
        grid: { color: 'rgba(148,163,184,0.06)', drawBorder: false },
        ticks: {
          color: '#475569',
          font: { size: 10, family: 'Inter' },
          callback: (v) => v + '%',
          stepSize: 5,
        },
        title: {
          display: true,
          text: 'Percentile (higher = better)',
          color: '#64748b',
          font: { size: 11, family: 'Inter' },
        }
      }
    }
  }
});
</script>
</body></html>

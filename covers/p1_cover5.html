<!DOCTYPE html><html><head><meta charset="utf-8">

<style>*{margin:0;padding:0;box-sizing:border-box}body{width:1200px;height:630px;overflow:hidden;background:#18181b;position:relative;font-family:'Space Grotesk',sans-serif}

h1 span{color:#fbbf24}
.desc{color:#71717a;font-size:14px;line-height:1.7;max-width:600px;margin-top:12px}
.footer{display:flex;align-items:center;gap:30px;color:#52525b;font-size:12px;letter-spacing:1px}
.footer .sep{width:40px;height:1px;background:#3f3f46}

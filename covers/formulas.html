<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Georgia', serif; padding: 40px; }
.formula {
  margin: 60px 0;
  padding: 24px 32px;
  background: #f8f9fa;
  border-radius: 8px;
  border-left: 4px solid #2563eb;
  display: inline-block;
}
.formula-label {
  font-size: 12px; color: #6b7280; margin-bottom: 12px;
  font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px;
}
.katex-display { margin: 0 !important; }
</style>
</head><body>

<div class="formula" id="f1">
<div class="formula-label">Formula 1 — Toy Example (Objective)</div>
<div id="f1-math"></div>
</div>

<br><br>

<div class="formula" id="f2">
<div class="formula-label">Formula 2 — Toy Example (Constraints)</div>
<div id="f2-math"></div>
</div>

<br><br>

<div class="formula" id="f3">
<div class="formula-label">Formula 3 — Full Objective Function</div>
<div id="f3-math"></div>
</div>

<br><br>

<div class="formula" id="f4">
<div class="formula-label">Formula 4 — Squad Flow</div>
<div id="f4-math"></div>
</div>

<br><br>

<div class="formula" id="f5">
<div class="formula-label">Formula 5 — Transfer Banking</div>
<div id="f5-math"></div>
</div>

<br><br>

<div class="formula" id="f6">
<div class="formula-label">Formula 6 — Free Hit Sub-Problem</div>
<div id="f6-math"></div>
</div>

<script>
const formulas = {
  'f1-math': '\\max \\quad 5x_A + 3x_B + 7x_C',
  'f2-math': '\\text{subject to:} \\quad x_A + x_B + x_C = 1, \\quad x_i \\in \\{0, 1\\}',
  'f3-math': '\\max \\sum_{t=1}^{H} \\left[ \\sum_{p \\in P} \\left( \\alpha \\cdot E_{p,t} \\cdot y_{p,t} + \\beta \\cdot E_{p,t} \\cdot (x_{p,t} - y_{p,t}) + \\alpha \\cdot E_{p,t} \\cdot c_{p,t} \\right) - 4h_t \\right]',
  'f4-math': 'x_{p,t} = x_{p,t-1} + s_{p,t} - r_{p,t}',
  'f5-math': 'A_{t+1} \\leq A_t - u_t + h_t + 1 + M \\cdot w_t',
  'f6-math': '\\max \\sum_{p} E_p \\cdot y_p + E_p \\cdot c_p',
};
for (const [id, tex] of Object.entries(formulas)) {
  katex.render(tex, document.getElementById(id), { displayMode: true, throwOnError: false });
}
</script>
</body></html>

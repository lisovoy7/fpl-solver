# ============================================================================
# fpl-solver configuration
# ============================================================================
# This is the only file you need to edit before running the solver.
# See README.md for full documentation of every parameter.

# ---------- Required ----------

# Your FPL team ID (from your team URL: fantasy.premierleague.com/entry/YOUR_ID/)
team_id: 4514531

# Free transfers available right now. Must be set manually because the FPL API
# does not reliably expose pending free transfers.
free_transfers: 3

# ---------- Auto-detected (override only if needed) ----------

# Current gameweek is auto-detected from the FPL API.
# Uncomment to override:
# current_gw: 27

# ---------- Solver parameters ----------

solver:
  # "rest_of_season" or an integer (e.g. 5 for 5-GW horizon)
  planning_horizon: rest_of_season

  # Minimum 60+ minute games a player must have to enter the candidate pool.
  # Lower = more players (less reliable). Higher = fewer players (more reliable).
  min_hist_games: 7

  # Probability that each starting-XI player won't play (rotation/injury).
  # 0.10 means ~1.1 expected subs per GW. Set to 0.0 to ignore bench value.
  sub_probability: 0.10

  # Artificial penalty per transfer in GW1 of the planning horizon.
  # Discourages the solver from front-loading transfers.  -1 = mild penalty.
  first_gw_transfer_penalty: -1

  # Solver time limit in seconds per chip scenario.
  time_limit_per_scenario: 15

  # Maximum chip scenarios to test (caps combinatorial explosion).
  max_scenarios: 100

# ---------- Chip usage state ----------
# Auto-detected from FPL API if omitted. Override here if detection is wrong.
# All four chip types follow the same rule: one per half-season (GW 1-19 and
# GW 20-38), so each can be 0, 1, or 2.  All unused chips are automatically
# enumerated by the solver — no enable/disable toggles needed.

chips:
  wildcards_used: 1        # 0, 1, or 2 (one per half-season)
  free_hits_used: 1        # 0, 1, or 2 (one per half-season)
  bench_boost_used: 1      # 0, 1, or 2 (one per half-season)
  triple_captain_used: 2   # 0, 1, or 2 (one per half-season)

# ---------- Transfer top-up rule ----------
# After trigger_gw, the solver allows up to transfer_count free transfers
# (models mid-season squad refresh e.g. AFCON window).

transfer_topup:
  enabled: true
  trigger_gw: 15
  transfer_count: 5

# ---------- Fixture overrides (DGW / BGW) ----------
# Override the gameweek assignment of specific fixtures.  Use this when the
# official schedule changes (postponements, double gameweeks, blank gameweeks)
# and the FPL API hasn't been updated yet.
# Each entry needs: home_team (team_id), away_team (team_id), gameweek (new GW).
# Find team IDs in data/team_tiers.csv.

fixture_overrides:
  - home_team: 1       # Arsenal
    away_team: 15      # Newcastle
    gameweek: 33
  - home_team: 6       # Brighton
    away_team: 7       # Chelsea
    gameweek: 33
  - home_team: 19      # West Ham
    away_team: 9       # Everton
    gameweek: 33
  - home_team: 3       # Burnley
    away_team: 13      # Man City
    gameweek: 33
  - home_team: 13      # Man City
    away_team: 8       # Crystal Palace
    gameweek: 37

# ---------- Player overrides ----------
# DISCLAIMER: The FPL API does NOT reflect transfers you've already made for the
# upcoming gameweek. If you've made transfers in the app, the solver won't see
# them. Run the solver BEFORE making transfers. Injuries, suspensions, and
# expected absences must also be entered manually below.

# Players who won't play in specific gameweeks (injury, suspension, rotation).
# Solver sets their expected points to 0 but may keep them in the squad.
non_playing: []
  # - player: 661     # Ekitike
  #   gameweeks: [21, 22]
  # - player: 441     # Dorgu
  #   gameweeks: [25, 26, 27, 28]

# Players forced into the starting lineup in specific gameweeks.
# Use when you have insider knowledge or want to lock in a differential.
forced_lineup: []
  # - player: 235     # Palmer
  #   gameweeks: [27]

# Adjust predicted points for specific players (across all gameweeks).
# multiplier > 1.0 = boost predictions, < 1.0 = reduce predictions.
# Useful when you believe the model under/over-estimates a player.
points_multiplier: []
  # - player: 235     # Palmer
  #   multiplier: 1.5

# Player IDs to always exclude from the candidate pool.
# Use for players you never want to own (non-differentials, personal preference).
excluded_players: []
  # - 5    # Gabriel

# Extra player IDs to force into the candidate pool even if they have fewer
# appearances than min_hist_games.  Use for new signings, returning-from-injury
# players, or anyone you trust despite limited game time this season.
extra_players: []
  # - 256  # Munoz — new signing, only 3 starts
